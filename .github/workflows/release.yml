# Release workflow — runs ONLY when a tag like `v26.6.0-alpha` is pushed.
# Builds the desktop app (Tauri) and the TUI binary per platform and uploads
# them to a GitHub Release (created as a prerelease draft for review).
#
# macOS signing: UNSIGNED by default. If you later add the Apple secrets
# (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
# APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID) to the repo, tauri-action will sign
# and notarize automatically — no workflow change needed.
#
# Actions pinned by commit SHA. Cargo.lock is gitignored, so no --locked.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & upload (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-13 # Intel
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential curl wget file libssl-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: crates/pass-tauri/ui/package-lock.json

      # ── TUI binary (`ichtaca`) ────────────────────────────────────────────
      - name: Build TUI (ichtaca)
        run: cargo build --release -p pass-tui --target ${{ matrix.target }}

      - name: Package TUI tarball
        shell: bash
        run: |
          dist="ichtaca-${{ github.ref_name }}-${{ matrix.label }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/ichtaca" "$dist/"
          cp README.md LICENSE CHANGELOG.md "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"
          echo "TUI_TARBALL=${dist}.tar.gz" >> "$GITHUB_ENV"

      # ── Desktop app (`ichtaca-desktop` / Ichtaca.app) ─────────────────────
      # tauri-action runs the UI build (beforeBuildCommand), builds the bundles,
      # creates the release (prerelease draft) and uploads the bundles.
      - name: Build & upload desktop app (Tauri)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing/notarization — only used if these secrets exist:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/pass-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Ichtaca ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}

      # ── Attach the TUI tarball to the same release ────────────────────────
      - name: Upload TUI tarball to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.TUI_TARBALL }}" --clobber
