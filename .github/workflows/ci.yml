# CI for Ichtaca — Rust Cargo workspace + Svelte/Vite (Tauri 2) frontend.
#
# Security posture:
#  - Third-party actions pinned to full commit SHAs (version in the comment).
#  - Least-privilege: top-level `permissions: contents: read`. No secrets used.
#  - Concurrency cancels superseded runs per ref.
#  - Cargo.lock is gitignored, so `--locked` is intentionally NOT used.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast Rust checks for the no-GUI crates (passcore + pass-tui).
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: passcore-pass-tui
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy -p passcore -p pass-tui --all-targets -- -D warnings
      - name: Test
        # passcore integration tests are #[ignore] (need real pass+gpg); skipped by default.
        run: cargo test -p passcore -p pass-tui

  # Frontend: Svelte + Vite + Vitest.
  ui:
    name: UI (check / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates/pass-tauri/ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: crates/pass-tauri/ui/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run test
      - run: npm run build

  # Heavier job: builds the Tauri crate (needs Linux WebKitGTK deps + ui/dist).
  tauri:
    name: Tauri (build + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential curl wget file libssl-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: pass-tauri
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: crates/pass-tauri/ui/package-lock.json
      - name: Build frontend (embedded by tauri at compile time)
        run: |
          npm --prefix crates/pass-tauri/ui ci
          npm --prefix crates/pass-tauri/ui run build
      - name: Build pass-tauri
        run: cargo build -p pass-tauri
      - name: Clippy pass-tauri
        run: cargo clippy -p pass-tauri --all-targets -- -D warnings
