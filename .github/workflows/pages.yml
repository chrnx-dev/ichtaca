# Build the Zola site (site/) and deploy it to GitHub Pages.
# Pages source must be set to "GitHub Actions" (done once via the API/settings).
# Actions pinned by commit SHA.

name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Zola
        run: |
          ZOLA_VERSION=0.22.1
          curl -sSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          sudo install -m 0755 zola /usr/local/bin/zola
          zola --version

      - name: Build site
        # base_url is taken from site/config.toml (the project subpath /ichtaca).
        run: zola --root site build --output-dir "$GITHUB_WORKSPACE/_site"

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
